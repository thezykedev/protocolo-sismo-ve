services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PB_VERSION: "0.39.4"
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
      - pocketbase_public:/pb/pb_public
      - pocketbase_hooks:/pb/pb_hooks

volumes:
  pocketbase_data:
  pocketbase_public:
  pocketbase_hooks:
