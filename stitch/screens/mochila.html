<!-- Interaction Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.kit-item');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const totalItems = items.length;

            function updateProgress() {
                const checkedCount = document.querySelectorAll('.kit-item input:checked').length;
                const percentage = (checkedCount / totalItems) * 100;
                
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `${checkedCount}/${totalItems}`;

                // Brutalist feedback on completion
                if (checkedCount === totalItems) {
                    progressBar.classList.add('bg-secondary-container');
                    progressBar.classList.remove('bg-primary-container');
                } else {
                    progressBar.classList.remove('bg-secondary-container');
                    progressBar.classList.add('bg-primary-container');
                }
            }

            items.forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                
                // Click handler for the whole label container
                item.addEventListener('click', (e) => {
                    // Prevent double triggering if they click exactly on the hidden checkbox
                    if(e.target !== checkbox) {
                        checkbox.checked = !checkbox.checked;
                    }
                    
                    // Toggle Brutalist active styling classes
                    if (checkbox.checked) {
                        item.classList.add('active', 'bg-primary-container', 'border-primary-container');
                        item.classList.remove('bg-surface', 'border-outline');
                    } else {
                        item.classList.remove('active', 'bg-primary-container', 'border-primary-container');
                        item.classList.add('bg-surface', 'border-outline');
                    }
                    
                    updateProgress();
                });
            });
        });
    </script>
